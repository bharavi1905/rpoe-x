[project]
name = "rpoe-x"
version = "0.1.0"
description = "RPOE-X: Multi-Agent Rotary Parking Optimization Environment"
requires-python = ">=3.11"
dependencies = [
    "openenv-core",
    "fastapi",
    "uvicorn[standard]",
    "pydantic",
    "numpy",
    "python-dotenv",
    "openai",
    "matplotlib>=3.10.8",
    "transformers>=5.6.1",
    "torch>=2.11.0",
    "accelerate>=1.13.0",
    "mlx-lm>=0.31.3",
    "dataset>=2.0.0",
    "datasets>=4.8.4",
]

[project.scripts]
server = "server.app:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["server", "tasks"]

[dependency-groups]
dev = [
    "pytest>=9.0.3",
]
